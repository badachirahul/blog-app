<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e8e8e8;
            --gray-400: #aaaaaa;
            --gray-600: #666666;
            --border: 1px solid #0a0a0a;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 48px;
            border: var(--border);
        }

        .auth-header {
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 0.85rem;
            color: var(--gray-600);
            font-weight: 300;
        }

        .message-box {
            padding: 12px 16px;
            border: var(--border);
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .message-box.error {
            border-color: #cc0000;
            color: #cc0000;
            background-color: #fff5f5;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-field input {
            width: 100%;
            border: var(--border);
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--black);
            background: var(--white);
            outline: none;
        }

        .form-field input::placeholder {
            color: var(--gray-400);
        }

        .form-field input:focus {
            background-color: var(--gray-100);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 12px;
            border: var(--border);
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--white);
            color: var(--black);
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .auth-links a {
            font-size: 0.8rem;
            color: var(--gray-600);
            text-decoration: none;
            border-bottom: 1px solid var(--gray-400);
            padding-bottom: 1px;
            transition: color 0.2s;
        }

        .auth-links a:hover {
            color: var(--black);
            border-color: var(--black);
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <h1>Register</h1>
        <p>Create your Blog Application account</p>
    </div>

    <div class="message-box error" th:if="${error}">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/auth/register}" th:object="${user}" method="post">
        <div class="form-field">
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" placeholder="Enter full name"/>
        </div>

        <div class="form-field">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Enter username"/>
        </div>

        <div class="form-field">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="Enter email"/>
        </div>

        <div class="form-field">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter password"/>
        </div>

        <button type="submit" class="btn-submit">Register</button>
    </form>

    <div class="auth-links">
        <a th:href="@{/blog/home}">Go to Home</a>
        <a th:href="@{/auth/login}">Already have an account? Login</a>
    </div>
</div>
</body>
</html>
