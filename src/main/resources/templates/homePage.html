<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog Home</title>
</head>
<body>
    <h1>Blog Application</h1>

    <a th:href="@{/blog/posts/new}">Create New Blog</a> <hr>

    <div th:each="post : ${posts}">
        <h2 th:text="${post.title}"></h2>

        <p th:text="${post.excerpt}"></p>

        <p>Author: <span th:text="${post.author}"></span></p>

        <p>Published date:
            <span th:text="${#temporals.format(post.publishedAt, 'dd MMM yyyy')}"></span>
        </p>

        <p>Tags:
            <span th:each="tag, stat : ${post.tags}">
                <span th:text="${tag.name}"></span><span th:if="${!stat.last}">, </span>
            </span>
        </p>

        <form th:action="@{/blog/posts/delete/{id}(id=${post.id})}" method="post">
            <button type="submit">Delete blog</button>
        </form>

        <a th:href="@{/blog/posts/update/{id}(id=${post.id})}">Update blog</a>

        <a th:href="@{/blog/posts/{id}(id=${post.id})}">Read more</a> <hr>
    </div>

    <div>
        <a th:if="${currentPage > 0}"
           th:href="@{/blog/home(page=${currentPage-1})}">
            Previous
        </a>

        <span th:text="${currentPage + 1}"></span>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/blog/home(page=${currentPage+1})}">
            Next
        </a>
    </div>
</body>
</html>
