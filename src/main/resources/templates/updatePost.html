<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New/Edit Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e8e8e8;
            --gray-400: #aaaaaa;
            --gray-600: #666666;
            --border: 1px solid #0a0a0a;
            --error: #cc0000;
        }

        body {
            background-color: var(--gray-100);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 24px;
        }

        /* ── CARD ── */
        .container {
            background: var(--white);
            border: var(--border);
            width: 100%;
            max-width: 680px;
            padding: 48px 56px;
        }

        .container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 40px;
            text-align: center;
            color: var(--black);
        }

        /* ── FORM ── */
        form {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 28px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--black);
        }

        input[type="text"],
        textarea {
            width: 100%;
            border: var(--border);
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--black);
            background: var(--white);
            outline: none;
            transition: background 0.2s;
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            background: var(--gray-100);
        }

        textarea {
            min-height: 280px;
            line-height: 1.6;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--gray-400);
        }

        /* ── ERROR ── */
        .error {
            font-size: 0.78rem;
            color: var(--error);
            font-weight: 400;
        }

        /* ── BUTTON ── */
        .btn {
            align-self: flex-end;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 12px 32px;
            border: var(--border);
            background: var(--black);
            color: var(--white);
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--gray-600);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit post</h1>

        <form th:action="@{/blog/posts/update}" th:object="${post}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="Title" required/>
                <span th:if="${#fields.hasErrors('title')}"
                      th:errors="*{title}"
                      class="error">
                    </span>
            </div>

            <div class="field">
                <label>Tags</label>
                <input type="text"
                       name="tagNames"
                       placeholder="spring, java, backend..."
                       th:value="${#strings.listJoin(post.tags.![name], ', ')}" required/>
            </div>

            <div class="field">
                <label>Content</label>
                <textarea th:field="*{content}" required></textarea>
            </div>

            <button class="btn" type="submit">Publish</button>
        </form>
    </div>
</body>
</html>
