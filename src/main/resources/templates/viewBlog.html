<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Blog</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#efefef;
        }

        .container{
            width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
        }

        h2{
            margin-bottom:20px;
        }

        .content{
            line-height:1.6;
            margin-bottom:20px;
            text-align: justify;
            line-height: 1.6;
        }

        .meta{
            color:#555;
            margin-bottom:10px;
        }

        .tags{
            margin-top:15px;
        }

        .tag{
            background:#f2f2f2;
            padding:4px 8px;
            margin-right:5px;
            border-radius:4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 th:text="${post.title}"></h2>

        <p class="content" th:text="${post.content}"></p>

        <p class="meta">
            Author:
            <span th:text="${post.author}"></span>
        </p>

        <p class="meta">
            Published date:
            <span th:text="${#temporals.format(post.publishedAt, 'dd MMM yyyy')}"></span>
        </p>

        <p class="tags">
            Tags:
            <span th:each="tag, stat : ${post.tags}" class="tag">
                <span th:text="${tag.name}"></span>
            </span>
        </p>
    </div>
</body>
</html>
