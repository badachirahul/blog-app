<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Blog</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#efefef;
        }

        .container{
            width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
        }

        h2{
            margin-bottom:20px;
        }

        .content{
            line-height:1.6;
            margin-bottom:20px;
            text-align: justify;
            line-height: 1.6;
        }

        .meta{
            color:#555;
            margin-bottom:10px;
        }

        .tags{
            margin-top:15px;
        }

        .tag{
            background:#f2f2f2;
            padding:4px 8px;
            margin-right:5px;
            border-radius:4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 th:text="${post.title}"></h2>

        <p class="content" th:text="${post.content}"></p>

        <p class="meta">
            Author:
            <span th:text="${post.author}"></span>
        </p>

        <p class="meta">
            Published date:
            <span th:text="${#temporals.format(post.publishedAt, 'dd MMM yyyy')}"></span>
        </p>

        <p class="tags">
            Tags:
            <span th:each="tag, stat : ${post.tags}" class="tag">
                <span th:text="${tag.name}"></span>
            </span>
        </p>

        <form th:action="@{/blog/posts/delete/{id}(id=${post.id})}" method="post">
            <button type="submit">Delete blog</button>
        </form>

        <a th:href="@{/blog/posts/update/{id}(id=${post.id})}">Update blog</a>
    </div>

    <form th:action="@{/blog/posts/{postId}/comments(postId=${post.id})}" th:object="${comment}" method="post">
        <input type="hidden" th:field="*{id}">

        Name: <input type="text" th:field="*{name}" required> <br><br>

        Email: <input type="text" th:field="*{email}" required> <br><br>

        comment: <textarea th:field="*{message}"></textarea>

        <input type="submit" value="Submit">
    </form>

    <hr>

    <div th:each="comment : ${post.comments}">
        <p>Name: <span th:text="${comment.name}"></span></p>
        <p>Comment: <span th:text="${comment.message}"></span></p>

        <form th:action="@{/blog/posts/{postId}/comments/{commentId}/delete(
                                postId=${post.id},
                                commentId=${comment.Id})}" method="post">
            <button type="submit">Delete comment</button>
        </form>

        <a th:href="@{/blog/posts/{postId}/comments/{commentId}/update(
                                postId=${post.Id},
                                commentId=${comment.Id})}">
            Update comment
        </a>

        <hr>
    </div>
</body>
</html>
