<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Access Denied</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --black: #0a0a0a;
        --white: #ffffff;
        --gray-100: #f5f5f5;
        --gray-400: #aaaaaa;
        --gray-600: #666666;
        --border: 1px solid #0a0a0a;
    }

    body {
        background-color: var(--white);
        color: var(--black);
        font-family: 'DM Sans', sans-serif;
        font-weight: 400;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .error-container {
        width: 100%;
        max-width: 420px;
        padding: 48px;
        border: var(--border);
        text-align: center;
    }

    .error-code {
        font-family: 'Playfair Display', serif;
        font-size: 5rem;
        font-weight: 900;
        letter-spacing: -2px;
        margin-bottom: 8px;
    }

    .error-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 16px;
    }

    .error-message {
        font-size: 0.88rem;
        color: var(--gray-600);
        font-weight: 300;
        line-height: 1.65;
        margin-bottom: 32px;
    }

    .btn-home {
        display: inline-block;
        text-decoration: none;
        background-color: var(--black);
        color: var(--white);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 10px 28px;
        border: var(--border);
        transition: background 0.2s, color 0.2s;
    }

    .btn-home:hover {
        background-color: var(--white);
        color: var(--black);
    }

    .divider {
        border: none;
        border-top: var(--border);
        margin: 32px 0;
    }
  </style>
</head>
<body>
<div class="error-container">
  <div class="error-code">403</div>
  <div class="error-title">Access Denied</div>
  <hr class="divider">
  <p class="error-message">You are not allowed to perform this action.</p>
  <a th:href="@{/blog/home}" class="btn-home">Go back to home</a>
</div>
</body>
</html>
