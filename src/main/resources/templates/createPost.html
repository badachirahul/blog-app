<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Blog</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#efefef;
        }

        .container{
            width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input[type=text]{
            width:100%;
            padding:8px;
            margin-top:5px;
        }

        textarea{
            width:100%;
            height:300px;
            padding:10px;
        }

        button{
            padding:10px 20px;
            margin-top:20px;
            cursor:pointer;
        }

        .error{
            color:red;
            font-size:14px;
        }

        .button-group{
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>New Blog Post</h1>

        <form th:action="@{/blog/posts}" th:object="${post}" method="POST">
            Title:
            <input type="text" th:field="*{title}" required>

            <span th:if="${#fields.hasErrors('title')}"
                  th:errors="*{title}"
                  class="error">
            </span> <br><br>

            Content:
            <textarea th:field="*{content}" required></textarea> <br><br>

            Author:
            <input type="text" th:field="*{author}" required>

            <span th:if="${#fields.hasErrors('author')}"
                  th:errors="*{author}"
                  class="error">
            </span> <br><br>

            Tags:
            <input type="text" name="tagNames" placeholder="spring, java, backend..." required> <br><br>

            <div class="button-group">
                <button type="submit" name="action" value="draft">Save Draft</button>
                <button type="submit" name="action" value="publish">Publish</button>
            </div>
        </form>
    </div>
</body>
</html>
